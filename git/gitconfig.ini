[user]
	name = Aran Borkum
	email = aran.borkum@kraken.tech
[core]
	editor = nvim
	excludesfile = /Users/aran.borkum/.config/git/gitignore_global
    pager = delta
[pull]
	rebase = true
[alias]
	lola = log --graph --decorate --pretty='format:%C(auto)%h %d %s %C(green)%an%C(bold blue) %ad' --abbrev-commit --all --date=relative
	lol = log --graph --decorate --pretty='format:%C(auto)%h %d %s %C(green)%an%C(bold blue) %ad' --abbrev-commit --date=relative
	absorb = absorb --and-rebase
	default-branch = "!git symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null | sed 's@^origin/@@'"
	irebase = "!git rebase -i HEAD~`git count-commit` --autostash"
	fcheckout = "!git checkout `git branch | fzf`"
	frebase = "!git rebase `git branch | fzf`"
	short-branch = "!git rev-parse --abbrev-ref HEAD 3>/dev/null | awk '{ if (length($0) > 30) print substr($0, 1, 30) \"...\"; else print }'"
	fixup = "!f(){ \
		base=$(git default-branch); \
		git log `git rev-parse --abbrev-ref HEAD` --pretty=format:'%h %s' --no-merges --not \"$base\" | fzf | cut -c -7 | xargs -o git commit --fixup; \
    }; f"
	fshow = "!f(){ \
		base=$(git default-branch); \
		git log `git rev-parse --abbrev-ref HEAD` --pretty=format:'%h %s' --no-merges --not \"$base\" | fzf | cut -c -7 | xargs -o git show; \
    }; f"
	count-commit = "!f(){ \
		base=$(git default-branch); \
		git rev-list --count HEAD --not \"$base\"; \
	}; f"
	update = "!f(){ \
	    base=$(git default-branch); \
	    git fetch origin \"$base\":\"$base\"; \
	    git rebase \"$base\" --update-refs --autostash; \
	}; f"
[url "ssh://git@github.com/octoenergy/"]
	insteadof = https://github.com/octoenergy/
[push]
	autoSetupRemote = true
[interactive]
    diffFilter = delta --color-only

[delta]
    navigate = true    # use n and N to move between diff sections
    side-by-side = true
	dark = true
	hunk-header-style = syntax
  	hunk-header-decoration-style = blue box
  	hunk-header-line-number-style = bold yellow
  	hunk-header-file-style = italic
[merge]
    conflictstyle = diff3
[diff]
    colorMoved = default

